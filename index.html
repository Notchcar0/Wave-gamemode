<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>GD Wave</title>
    <style>
        body { margin: 0; overflow: hidden; background: #3d3366; font-family: 'Arial', sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui"><h1 id="msg">Klik of Spatie om te Starten</h1></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msg = document.getElementById('msg');

    let py, pyv, isHolding, isGameOver, trail, spikes, frameCount, score;
    let baseSpeed, playerX;
    let stars;
    
    // Highscore ophalen uit browser geheugen
    let highscore = localStorage.getItem("gd_highscore") || 0;

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        // Snelheid en positie schalen mee met de breedte van het scherm
        baseSpeed = canvas.width / 160; 
        playerX = canvas.width / 5;
    }
    window.addEventListener('resize', resize);
    resize();

    function reset() {
        py = canvas.height / 10;
        pyv = 0;
        isHolding = false;
        isGameOver = false;
        trail = [];
        spikes = [];
        frameCount = 0;
        score = 0;
        msg.innerText = "";
        stars = [];
            for (let i = 0; i < 100; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 5,
                    speed: Math.random() * baseSpeed * 0.5 + 0.2
    });
}
    }

    const press = () => { if(isGameOver) reset(); else isHolding = true; };
    const release = () => isHolding = false;

    window.addEventListener('mousedown', press);
    window.addEventListener('mouseup', release);
    window.addEventListener('touchstart', (e) => { e.preventDefault(); press(); }, {passive: false});
    window.addEventListener('touchend', release);
    window.addEventListener('keydown', (e) => { 
    if(e.code === 'Space' || e.code === 'ArrowUp') press(); 
});

window.addEventListener('keyup', (e) => { 
    if(e.code === 'Space' || e.code === 'ArrowUp') release(); 
});

    function spawnSpike() {
    const isTop = Math.random() > 0.5;
    
    // We bepalen eerst de breedte (bijv. 60% van het scherm)
    const spikeWidth = canvas.width * 0.5; 
    
    spikes.push({
        x: canvas.width + (spikeWidth / 2),
        y: isTop ? 0 : canvas.height,
        w: spikeWidth,
        h: spikeWidth / 2, // De hoogte is nu altijd de helft van de breedte
        isTop: isTop
    });
}


    function checkHighscore() {
        let finalScore = Math.floor(score / 10);
        if (finalScore > highscore) {
            highscore = finalScore;
            localStorage.setItem("gd_highscore", highscore);
        }
    }

    function update() {
        if (!isGameOver) {
            // Beweeg omhoog of omlaag
            pyv = isHolding ? -baseSpeed : baseSpeed;
            py += pyv;

            // Check schermranden
            if (py < 0 || py > canvas.height) {
                isGameOver = true;
                checkHighscore();
            }

            // Trail updaten (relatief aan snelheid)
            trail.push({x: playerX, y: py});
            if (trail.length > 100) trail.shift();
            trail.forEach(p => p.x -= baseSpeed);

            // Score verhogen
            score++;

            // Spikes spawnen elke 30 frames
            frameCount++;
            if (frameCount % 20 === 0) spawnSpike();

            for (let i = spikes.length - 1; i >= 0; i--) {
                let s = spikes[i];
                s.x -= baseSpeed;

                // Hitbox berekening (driehoek-vorm)
                let hitW = s.w * 1; 
                let hitH = s.h * 1;
                let dx = Math.abs(playerX - s.x);

                if (dx < hitW / 2) {
                    let currentHitHeight = hitH * (1 - (dx / (hitW / 2)));
                    if (s.isTop) {
                        if (py < currentHitHeight) { isGameOver = true; checkHighscore(); }
                    } else {
                        if (py > canvas.height - currentHitHeight) { isGameOver = true; checkHighscore(); }
                    }
                }
                if (s.x < -canvas.width) spikes.splice(i, 1);
            }
        }

        stars.forEach(s => {
            s.x -= s.speed;

            if (s.x < 0) {
                s.x = canvas.width;
                s.y = Math.random() * canvas.height;
    }
});

        draw();
        requestAnimationFrame(update);
    }

    function draw() {
        // Achtergrond
        ctx.fillStyle = '#0a0a0a';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Sterren achtergrond
        ctx.fillStyle = "#0ff";
        stars.forEach(s => {
            ctx.globalAlpha = 0.3 + Math.random() * 0.7;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });
        ctx.globalAlpha = 1;

        // Trail (Wave lijn)
        ctx.strokeStyle = '#0ff';
        ctx.lineWidth = 15;
        ctx.beginPath();
        trail.forEach((p, i) => {
            if (i === 0) ctx.moveTo(p.x, p.y);
            else ctx.lineTo(p.x, p.y);
        });
        ctx.stroke();

        // Spikes
        ctx.fillStyle = '#055482';

        spikes.forEach(s => {
            ctx.beginPath();
            if (s.isTop) {
                ctx.moveTo(s.x - s.w/2, 0);
                ctx.lineTo(s.x + s.w/2, 0);
                ctx.lineTo(s.x, s.h);
            } else {
                ctx.moveTo(s.x - s.w/2, canvas.height);
                ctx.lineTo(s.x + s.w/2, canvas.height);
                ctx.lineTo(s.x, canvas.height - s.h);
            }
            ctx.fill();
        });

        // Wave speler
        ctx.fillStyle = 'white';
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#0ff";
        ctx.beginPath();
        ctx.arc(playerX, py, 12, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // HUD: Score en Highscore
        ctx.fillStyle = "white";
        ctx.font = "bold 24px Arial";
        ctx.textAlign = "left";
        ctx.fillText("SCORE: " + Math.floor(score / 10), 25, 45);
        ctx.fillStyle = "rgba(255,255,255,0.5)";
        ctx.font = "18px Arial";
        ctx.fillText("BEST: " + highscore, 25, 75);

        // Game Over Scherm
        if (isGameOver && frameCount > 0) {
            ctx.fillStyle = "rgba(0, 0, 0, 0.75)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.textAlign = "center";
            ctx.fillStyle = "#ff3333";
            ctx.font = "bold 50px Arial";
            ctx.fillText("GAME OVER", canvas.width / 2, canvas.height / 2 - 20);
            ctx.fillStyle = "white";
            ctx.font = "24px Arial";
            ctx.fillText("Score: " + Math.floor(score / 10), canvas.width / 2, canvas.height / 2 + 30);
            ctx.font = "18px Arial";
            ctx.fillText("Click to try again", canvas.width / 2, canvas.height / 2 + 80);
        }
    }

    reset();
    isGameOver = true;
    update();
</script>
</body>
</html>
