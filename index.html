<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<title>GD Wave – Glow Corridor</title>
<style>
body { margin:0; overflow:hidden; background:black; }
canvas { display:block; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const BASE_W = 1920;
const BASE_H = 1080;

let scale, baseSpeed, playerX;
let py, isHolding=false, isGameOver=false;
let path=[], trail=[];
let lastTime=0;
let canMove=false;
let startCountdown=1000;

let segmentLength, amplitude, thickness, playerRadius;

let score=0, highScore=0, scoreSpeed=5;

// sterrenachtergrond
let stars=[];
for(let i=0;i<100;i++){
    stars.push({x:Math.random()*BASE_W, y:Math.random()*BASE_H, r:Math.random()*2+1, speed:Math.random()*0.5+0.2});
}

function resize(){
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    scale = Math.min(canvas.width/BASE_W, canvas.height/BASE_H);
    baseSpeed = 20*scale;
    playerX = canvas.width*0.2;
    segmentLength = 120*scale;
    amplitude = 120*scale;
    thickness = 300*scale;
    playerRadius = 20*scale;
    reset();
}
window.addEventListener("resize", resize);
resize();

function reset(){
    isGameOver=false;
    trail=[];
    path=[];
    canMove=false;
    startCountdown=1000;
    score=0;
    let startX=0;
    let startY=canvas.height/2;
    path.push({x:startX, y:startY});
    for(let i=0;i<30;i++) addSegment();
    py = getY(playerX);
}

function addSegment(){
    let last = path[path.length-1];
    let dir = Math.random()>0.5?1:-1;
    let newY = last.y + dir*amplitude;
    if(newY<thickness) newY=last.y+amplitude;
    if(newY>canvas.height-thickness) newY=last.y-amplitude;
    path.push({x:last.x+segmentLength, y:newY});
}

function press(){ if(isGameOver) reset(); isHolding=true; }
function release(){ isHolding=false; }

window.addEventListener("mousedown", press);
window.addEventListener("mouseup", release);
window.addEventListener("touchstart", e=>{ e.preventDefault(); press(); }, {passive:false});
window.addEventListener("touchend", release);
window.addEventListener("keydown", e=>{ if(e.code==="Space") press(); });
window.addEventListener("keyup", e=>{ if(e.code==="Space") release(); });

function getY(x){
    if(path.length<2) return canvas.height/2;
    for(let i=0;i<path.length-1;i++){
        let p1=path[i], p2=path[i+1];
        if(x>=p1.x && x<=p2.x){
            let t=(x-p1.x)/(p2.x-p1.x);
            return p1.y+(p2.y-p1.y)*t;
        }
    }
    return path[path.length-1].y;
}

function update(time=0){
    let delta=(time-lastTime)/16.67;
    lastTime=time;

    if(isGameOver){ draw(); requestAnimationFrame(update); return; }

    // countdown
    if(startCountdown>0){
        startCountdown-=delta*16.67;
        if(startCountdown<=0){
            startCountdown=0;
            canMove=true;
        }
    }

    if(canMove){
        let move=baseSpeed*delta;
        py += isHolding?-move:move;

        path.forEach(p=>p.x-=baseSpeed*delta);
        while(path[path.length-1].x<canvas.width) addSegment();
        if(path[0].x<-segmentLength) path.shift();

        let center=getY(playerX);
        if(py-playerRadius < center-thickness/2 || py+playerRadius > center+thickness/2){
            isGameOver=true;
            if(score>highScore) highScore=Math.floor(score);
        }

        score += scoreSpeed*delta*16.67/1000;
    }

    trail.push({x:playerX, y:py});
    if(trail.length>150) trail.shift();
    if(canMove) trail.forEach(p=>p.x-=baseSpeed*delta);

    stars.forEach(s=>{ s.x-=s.speed; if(s.x<0) s.x=canvas.width; });

    draw();
    requestAnimationFrame(update);
}

function draw(){
    // achtergrond
    ctx.fillStyle="black";
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="white";
    stars.forEach(s=>{ ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill(); });

    // corridor gradient
    if(path.length>0){
        let grad=ctx.createLinearGradient(0,0,0,canvas.height);
        grad.addColorStop(0,"#0a3d91");
        grad.addColorStop(1,"#00bfff");
        ctx.fillStyle=grad;

        // boven
        ctx.beginPath();
        ctx.moveTo(path[0].x,0);
        path.forEach(p=>ctx.lineTo(p.x, p.y-thickness/2));
        ctx.lineTo(path[path.length-1].x,0);
        ctx.closePath();
        ctx.fill();

        // onder
        ctx.beginPath();
        ctx.moveTo(path[0].x,canvas.height);
        path.forEach(p=>ctx.lineTo(p.x,p.y+thickness/2));
        ctx.lineTo(path[path.length-1].x,canvas.height);
        ctx.closePath();
        ctx.fill();

        // glow rand
        ctx.save();
        ctx.strokeStyle="white";
        ctx.lineWidth=4*scale;
        ctx.shadowColor="white";
        ctx.shadowBlur=20*scale;

        // bovenrand
        ctx.beginPath();
        path.forEach((p,i)=>{ if(i===0) ctx.moveTo(p.x,p.y-thickness/2); else ctx.lineTo(p.x,p.y-thickness/2); });
        ctx.stroke();

        // onderrand
        ctx.beginPath();
        path.forEach((p,i)=>{ if(i===0) ctx.moveTo(p.x,p.y+thickness/2); else ctx.lineTo(p.x,p.y+thickness/2); });
        ctx.stroke();
        ctx.restore();
    }

    // trail
    if(trail.length>0){
        let gradTrail=ctx.createLinearGradient(0,0,canvas.width,0);
        gradTrail.addColorStop(0,"#0ff");
        gradTrail.addColorStop(1,"#00ffff");
        ctx.strokeStyle=gradTrail;
        ctx.lineWidth=25*scale;
        ctx.beginPath();
        trail.forEach((p,i)=>{ if(i===0) ctx.moveTo(p.x,p.y); else ctx.lineTo(p.x,p.y); });
        ctx.stroke();
    }

    // speler glow
    ctx.save();
    ctx.shadowColor="#0ff";
    ctx.shadowBlur=20*scale;
    ctx.fillStyle="white";
    ctx.beginPath();
    ctx.arc(playerX,py,playerRadius,0,Math.PI*2);
    ctx.fill();
    ctx.restore();

    // score
    ctx.fillStyle="yellow";
    ctx.font="30px Arial";
    ctx.fillText("Score: "+Math.floor(score),20,40);
    ctx.fillText("High Score: "+Math.floor(highScore),20,80);

    // countdown
    if(!canMove){
        ctx.fillStyle="yellow";
        ctx.font="50px Arial";
        ctx.fillText("Get Ready!",canvas.width/2-130,canvas.height/2);

        let barWidth=400;
        let barHeight=20;
        let x=canvas.width/2-barWidth/2;
        let y=canvas.height/2+40;
        let pct=startCountdown/1000;
        ctx.fillStyle="grey";
        ctx.fillRect(x,y,barWidth,barHeight);
        ctx.fillStyle="lime";
        ctx.fillRect(x,y,barWidth*(1-pct),barHeight);
        ctx.strokeStyle="white";
        ctx.lineWidth=2;
        ctx.strokeRect(x,y,barWidth,barHeight);
    }

    if(isGameOver){
        ctx.fillStyle="red";
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",canvas.width/2-120,canvas.height/2);
    }
}

update();
</script>

</body>
</html>
